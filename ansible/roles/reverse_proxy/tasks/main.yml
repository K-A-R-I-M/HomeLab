###### Packages Needed
##  nginx

#------ Let's Encrypt SSL cert HTTPS
- name: Check cert folder exists
  stat:
    path: /etc/letsencrypt/live/{{ reverse_proxy.domain }}/
  register: stat_result

- name: Request a cert with Certbot
  shell:
    cmd: /snap/bin/certbot --nginx -d {{ reverse_proxy.domain }} --non-interactive --agree-tos -m {{ reverse_proxy.email }}
  when: not stat_result.stat.exists

#------ NGINX conf for different paths
- name: Create endpoints dir
  file:
    path: /etc/nginx/conf.d/endpoints
    state: directory
    mode: '0755'

- name: Remove existing location / block from nginx config
  replace:
    path: /etc/nginx/sites-available/default
    regexp: 'location / \{[^}]*\}'
    replace: ''

- name: Setup nginx endpoints config
  include_tasks:
    file: endpoint-setup-config.yml
  loop: "{{ reverse_proxy.endpoints }}"

- name: Insert include endpoints into SSL server block
  blockinfile:
    path: /etc/nginx/sites-available/default
    marker: "# {mark} ANSIBLE MANAGED BLOCK for endpoints"
    insertafter: "listen 443 ssl;"
    block: |
      include /etc/nginx/conf.d/endpoints/*.conf;

###################### TEST

- name: Find all endpoint .conf files
  find:
    paths: /etc/nginx/conf.d/endpoints
    patterns: "*.conf"
  register: found_confs

- name: Read each conf file content
  slurp:
    src: "{{ item.path }}"
  loop: "{{ found_confs.files }}"
  register: conf_contents

- name: Insert content of each conf into SSL server block
  blockinfile:
    path: /etc/nginx/sites-available/default
    marker: "# {mark} ANSIBLE MANAGED BLOCK for {{ item.item.path | basename }}"
    insertafter: "listen 443 ssl;"
    block: "{{ item.content | b64decode }}"
  loop: "{{ conf_contents.results }}"

###################### TEST

- name: Check nginx config syntax
  shell: nginx -t
  register: nginx_test
  failed_when: nginx_test.rc != 0
  changed_when: false

- name: Reload service nginx, in all cases
  systemd_service:
    name: nginx.service
    state: restarted